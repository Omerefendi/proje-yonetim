spring.application.name=proje-yonetim

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/projeyonetim;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=admin123

# H2 Console (development only - disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# JWT Secret - override via environment variable in production
app.jwt.secret=${JWT_SECRET:ProjeYonetimSistemiGizliAnahtarOkumanizIcinTesekkurler2024SecretKey256Bit}
app.jwt.expiration=86400000

# CORS - override via environment variable in production
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500}

# Logging
logging.level.com.projeyonetim=DEBUG
logging.level.org.springframework.security=INFO
server.error.include-message=always
server.error.include-stacktrace=always
