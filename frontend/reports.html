<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raporlar | Proje Yönetim Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                    </svg>
                    <span>Proje Yönetim</span>
                </div>
            </div>

            <div class="sidebar-content">
                <div class="nav-section">
                    <div class="nav-section-title">Görünümler</div>
                    <a href="index.html" class="nav-item">Dashboard</a>
                    <a href="projects.html" class="nav-item">Projeler</a>
                    <a href="timeline.html" class="nav-item">Zaman Çizelgesi</a>
                    <a href="reports.html" class="nav-item active">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        Raporlar
                    </a>
                </div>

                <div class="nav-section admin-only">
                    <div class="nav-section-title">Yönetim</div>
                    <a href="users.html" class="nav-item">Kullanıcılar</a>
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="user-avatar" id="userAvatarText">U</div>
                <div class="user-info">
                    <div class="user-name" id="sidebarUserName">Kullanıcı Adı</div>
                    <div class="user-role" id="sidebarUserRole">Rol</div>
                </div>
                <button class="logout-btn" id="logoutBtn"><svg viewBox="0 0 24 24" width="18" height="18" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg></button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <h1 class="header-title">Raporlama ve Çıktı</h1>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="window.print()">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="6 9 6 2 18 2 18 9"></polyline>
                            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                            <rect x="6" y="14" width="12" height="8"></rect>
                        </svg>
                        Yazdır / PDF Al
                    </button>
                </div>
            </header>

            <div class="content-body" id="printArea">
                <div class="card">
                    <h2 style="margin-bottom: 24px;">Genel Proje Özeti</h2>
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>PROJE</th>
                                    <th>DURUM</th>
                                    <th>SORUMLU</th>
                                    <th>BAŞLANGIÇ</th>
                                    <th>BİTİŞ</th>
                                </tr>
                            </thead>
                            <tbody id="reportTableBody">
                                <tr>
                                    <td colspan="5" style="text-align:center;">Yükleniyor...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="card mt-4">
                    <h2 style="margin-bottom: 24px;">Kullanıcı İş Yükü Özeti</h2>
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>KULLANICI</th>
                                    <th>ROL</th>
                                    <th>AÇIK GÖREV SAYISI</th>
                                </tr>
                            </thead>
                            <tbody id="workloadTableBody">
                                <tr>
                                    <td colspan="3" style="text-align:center;">Yükleniyor...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add print specific CSS to hide UI components -->
    <style>
        @media print {

            .sidebar,
            .main-header {
                display: none !important;
            }

            .app-container {
                height: auto;
            }

            .main-content {
                margin: 0;
                padding: 0;
                background: white;
                flex: none;
                overflow: visible;
            }

            .card {
                box-shadow: none;
                border: 1px solid #ddd;
                break-inside: avoid;
            }

            body {
                background: white;
            }
        }
    </style>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Load Project Summary
                const projRes = await apiCall('/projects');
                const projects = projRes.data;
                const tbody = document.getElementById('reportTableBody');

                let phtml = '';
                projects.forEach(p => {
                    phtml += `
                        <tr>
                            <td><strong>${p.name}</strong></td>
                            <td>${getStatusLabel(p.status)}</td>
                            <td>${p.owner ? p.owner.fullName : '-'}</td>
                            <td>${formatDate(p.startDate)}</td>
                            <td>${formatDate(p.endDate)}</td>
                        </tr>
                    `;
                });
                tbody.innerHTML = phtml || '<tr><td colspan="5">Kayıtlı proje yok</td></tr>';

                // Load Dashboard Stats for Workload
                const statRes = await apiCall('/dashboard/stats');
                const workloads = statRes.data.userWorkloads;
                const wtbody = document.getElementById('workloadTableBody');

                let whtml = '';
                // Need roles, so let's quickly get all users to map roles too
                const userRes = await apiCall('/users');
                const userMap = {};
                userRes.data.forEach(u => userMap[u.id] = u.role);

                workloads.forEach(w => {
                    whtml += `
                        <tr>
                            <td><strong>${w.fullName}</strong> (${w.username})</td>
                            <td>${userMap[w.userId] === 'ADMIN' ? 'Sistem Yöneticisi' : userMap[w.userId] === 'MANAGER' ? 'Proje Müdürü' : 'Kullanıcı'}</td>
                            <td><span class="badge ${w.openTasks > 5 ? 'status-todo' : 'status-progress'}" style="font-size:14px">${w.openTasks}</span></td>
                        </tr>
                    `;
                });
                wtbody.innerHTML = whtml || '<tr><td colspan="3">Veri bulunamadı</td></tr>';

            } catch (error) {
                console.error(error);
            }
        });
    </script>
</body>

</html>
