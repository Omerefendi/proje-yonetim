<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giris Yap | Proje Yonetim Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body.login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--color-background-subtle);
            margin: 0;
        }

        .login-container {
            background-color: var(--color-surface);
            padding: 40px;
            border-radius: var(--radius-large);
            box-shadow: var(--shadow-overlay);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-logo {
            color: var(--color-primary);
            margin-bottom: 24px;
        }

        .login-logo svg {
            width: 48px;
            height: 48px;
        }

        .login-title {
            margin: 0 0 8px 0;
            color: var(--color-text);
            font-size: 24px;
        }

        .login-subtitle {
            margin: 0 0 32px 0;
            color: var(--color-text-subtle);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--color-text-subtle);
            font-size: 14px;
            text-align: left;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid var(--color-border);
            border-radius: var(--radius-medium);
            font-size: 14px;
            transition: border-color 0.2s;
            box-sizing: border-box;
            background-color: var(--color-surface);
            color: var(--color-text);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: var(--color-primary);
            color: var(--color-text-inverse);
            border: none;
            border-radius: var(--radius-medium);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: var(--color-primary-hover);
        }

        .error-message {
            color: var(--color-danger);
            font-size: 14px;
            margin-top: 16px;
            display: none;
            text-align: left;
            padding: 10px;
            background-color: var(--color-danger-subtle);
            border-radius: var(--radius-medium);
            border-left: 4px solid var(--color-danger);
        }

        .api-config {
            margin-top: 16px;
            text-align: left;
        }

        .api-config-toggle {
            background: none;
            border: none;
            color: var(--color-primary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            padding: 0;
        }

        .api-config-panel {
            display: none;
            margin-top: 12px;
            padding: 14px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-medium);
            background-color: var(--color-background-subtle);
        }

        .api-config-panel.active {
            display: block;
        }

        .api-config-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .btn-secondary,
        .btn-ghost {
            border-radius: var(--radius-medium);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            padding: 10px 12px;
        }

        .btn-secondary {
            background-color: var(--color-primary);
            border: none;
            color: var(--color-text-inverse);
        }

        .btn-secondary:hover {
            background-color: var(--color-primary-hover);
        }

        .btn-ghost {
            background-color: transparent;
            border: 1px solid var(--color-border);
            color: var(--color-text-subtle);
        }

        .btn-ghost:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .api-config-help {
            color: var(--color-text-subtle);
            font-size: 12px;
            line-height: 1.5;
            margin: 10px 0 0 0;
        }

        .demo-credentials {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--color-border);
            font-size: 12px;
            color: var(--color-text-subtlest);
            text-align: left;
        }

        .demo-credentials h4 {
            margin: 0 0 8px 0;
            color: var(--color-text-subtle);
        }

        .demo-credentials ul {
            margin: 0;
            padding-left: 16px;
        }
    </style>
</head>
<body class="login-page">

    <div class="login-container">
        <div class="login-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
        </div>
        <h1 class="login-title">Proje Yonetim Sistemi</h1>
        <p class="login-subtitle">Devam etmek icin giris yapin</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="username" class="form-label">Kullanici Adi</label>
                <input type="text" id="username" class="form-input" required placeholder="Kullanici adinizi girin">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Sifre</label>
                <input type="password" id="password" class="form-input" required placeholder="Sifrenizi girin">
            </div>

            <div id="errorMessage" class="error-message"></div>

            <div class="api-config">
                <button type="button" class="api-config-toggle" id="apiConfigToggle">API Ayarlari</button>
                <div id="apiConfigPanel" class="api-config-panel">
                    <label for="apiBaseUrlInput" class="form-label">API Adresi</label>
                    <input
                        type="text"
                        id="apiBaseUrlInput"
                        class="form-input"
                        placeholder="http://localhost:8080/api"
                    >
                    <div class="api-config-actions">
                        <button type="button" class="btn-secondary" id="saveApiConfigBtn">Kaydet</button>
                        <button type="button" class="btn-ghost" id="resetApiConfigBtn">Varsayilana Don</button>
                    </div>
                    <p id="apiConfigHelp" class="api-config-help"></p>
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">Giris Yap</button>
        </form>

        <div class="demo-credentials">
            <h4>Sistem Kullanicilari:</h4>
            <ul>
                <li><strong>Admin:</strong> admin / admin123</li>
                <li><strong>Yonetici:</strong> manager / manager123</li>
                <li><strong>Kullanici:</strong> ahmet / ahmet123</li>
            </ul>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const existingToken = localStorage.getItem('token');
        if (existingToken && existingToken.split('.').length === 3) {
            try {
                const payload = JSON.parse(atob(existingToken.split('.')[1]));
                if (payload.exp && payload.exp * 1000 > Date.now()) {
                    window.location.href = 'index.html';
                } else {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                }
            } catch (error) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
            }
        }

        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');
        const apiConfigToggle = document.getElementById('apiConfigToggle');
        const apiConfigPanel = document.getElementById('apiConfigPanel');
        const apiBaseUrlInput = document.getElementById('apiBaseUrlInput');
        const apiConfigHelp = document.getElementById('apiConfigHelp');
        const saveApiConfigBtn = document.getElementById('saveApiConfigBtn');
        const resetApiConfigBtn = document.getElementById('resetApiConfigBtn');

        function showMessage(message) {
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
        }

        function renderApiConfigState(openPanel = false) {
            const storedBaseUrl = window.apiConfig?.getStoredBaseUrl?.() || '';
            const currentBaseUrl = window.apiConfig?.getCurrentBaseUrl?.() || 'http://localhost:8080/api';

            apiBaseUrlInput.value = storedBaseUrl;
            apiConfigHelp.innerHTML = storedBaseUrl
                ? `Kayitli API adresi: <strong>${escapeHtml(storedBaseUrl)}</strong>`
                : `Backend varsayilan olarak <strong>${escapeHtml(currentBaseUrl)}</strong> adresinde aranir.`;

            if (openPanel) {
                apiConfigPanel.classList.add('active');
            }
        }

        apiConfigToggle.addEventListener('click', () => {
            apiConfigPanel.classList.toggle('active');
        });

        saveApiConfigBtn.addEventListener('click', () => {
            const value = apiBaseUrlInput.value.trim();
            const resolvedBaseUrl = window.apiConfig?.setBaseUrl?.(value);
            renderApiConfigState(true);
            showMessage(`API adresi kaydedildi: ${resolvedBaseUrl || 'varsayilan ayarlar'}`);
        });

        resetApiConfigBtn.addEventListener('click', () => {
            window.apiConfig?.clearBaseUrl?.();
            renderApiConfigState(true);
            showMessage('API adresi varsayilan ayarlara donduruldu.');
        });

        renderApiConfigState();

        document.getElementById('loginForm').addEventListener('submit', async event => {
            event.preventDefault();

            const originalBtnText = loginBtn.textContent;

            if (!usernameInput.value || !passwordInput.value) {
                showMessage('Lutfen kullanici adi ve sifre girin.');
                return;
            }

            try {
                loginBtn.textContent = 'Giris Yapiliyor...';
                loginBtn.disabled = true;
                errorMsg.style.display = 'none';

                const response = await apiCall('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({
                        username: usernameInput.value.trim(),
                        password: passwordInput.value
                    })
                });

                if (!response.success || !response.data || !response.data.token) {
                    throw new Error(response.message || 'Giris basarisiz. Lutfen bilgilerinizi kontrol edin.');
                }

                localStorage.setItem('token', response.data.token);
                localStorage.setItem('user', JSON.stringify(response.data));
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Login error:', error);
                if (error.isNetworkError) {
                    renderApiConfigState(true);
                }
                showMessage(getApiErrorMessage(error, 'Giris basarisiz. Lutfen tekrar deneyin.'));
                loginBtn.textContent = originalBtnText;
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
