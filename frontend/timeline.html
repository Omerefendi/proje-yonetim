<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaman Çizelgesi | Proje Yönetim Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Charts Timeline -->
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                    </svg>
                    <span>Proje Yönetim</span>
                </div>
            </div>

            <div class="sidebar-content">
                <div class="nav-section">
                    <div class="nav-section-title">Görünümler</div>
                    <a href="index.html" class="nav-item">Dashboard</a>
                    <a href="projects.html" class="nav-item">Projeler</a>
                    <a href="timeline.html" class="nav-item active">Zaman Çizelgesi</a>
                    <a href="reports.html" class="nav-item">Raporlar</a>
                </div>

                <div class="nav-section admin-only">
                    <div class="nav-section-title">Yönetim</div>
                    <a href="users.html" class="nav-item">Kullanıcılar</a>
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="user-avatar" id="userAvatarText">U</div>
                <div class="user-info">
                    <div class="user-name" id="sidebarUserName">Kullanıcı Adı</div>
                    <div class="user-role" id="sidebarUserRole">Rol</div>
                </div>
                <button class="logout-btn" id="logoutBtn"><svg viewBox="0 0 24 24" width="18" height="18" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg></button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <h1 class="header-title">Proje Zaman Çizelgesi (Gantt)</h1>
            </header>

            <div class="content-body">
                <div class="card">
                    <p style="color: var(--color-text-subtle); margin-bottom: 20px;">
                        Tüm projelerin başlangıç ve bitiş tarihlerine göre genel takvim dağılımı:
                    </p>
                    <div id="timelineChart" style="height: 500px; width: 100%;">
                        <div style="padding:40px; text-align:center;">Çizelge grafiği yükleniyor...</div>
                    </div>
                </div>

                <div class="card">
                    <h3 style="margin-bottom: 16px;">Özel CSS Gantt Çizelgesi</h3>
                    <div class="gantt-container" id="cssGantt">
                        <!-- CSS based fallback Gantt generated by JS -->
                        <div style="padding: 20px; text-align: center;">Yükleniyor...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script>
        google.charts.load('current', { 'packages': ['timeline'] });

        // Handle race condition: Google Charts may load before or after DOMContentLoaded
        let pendingProjects = null;
        let googleChartsReady = false;

        google.charts.setOnLoadCallback(() => {
            googleChartsReady = true;
            if (pendingProjects) drawChart(pendingProjects);
        });

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await apiCall('/dashboard/timeline');
                const projects = response.data;
                pendingProjects = projects;

                // Draw Google Chart if already loaded, otherwise it will draw when ready
                if (googleChartsReady) drawChart(projects);

                // Draw CSS Fallback Timeline immediately
                drawCssGantt(projects);

            } catch (error) {
                console.error("Timeline yüklenemedi", error);
                document.getElementById('timelineChart').innerHTML = 'Veri yüklenemedi';
            }
        });

        function drawChart(projects) {
            const container = document.getElementById('timelineChart');
            if (projects.length === 0) {
                container.innerHTML = '<div style="padding:40px; text-align:center;">Görüntülenecek proje yok</div>';
                return;
            }

            const chart = new google.visualization.Timeline(container);
            const dataTable = new google.visualization.DataTable();

            dataTable.addColumn({ type: 'string', id: 'Proje' });
            dataTable.addColumn({ type: 'string', id: 'İsim' });
            dataTable.addColumn({ type: 'date', id: 'Başlangıç' });
            dataTable.addColumn({ type: 'date', id: 'Bitiş' });

            const rows = projects.map(p => {
                const s = new Date(p.startDate);
                const e = new Date(p.endDate);
                return [p.name, getStatusLabel(p.status), s, e];
            });

            dataTable.addRows(rows);

            // Map colors safely
            const colors = {};
            projects.forEach(p => { colors[p.name] = p.color; });

            const options = {
                height: 500,
                timeline: { showRowLabels: true },
                colors: projects.map(p => p.color) // Simple mapping
            };

            chart.draw(dataTable, options);
        }

        // Custom CSS Gantt implementation for demonstration without external libraries
        function drawCssGantt(projects) {
            const container = document.getElementById('cssGantt');
            if (projects.length === 0) {
                container.innerHTML = 'Veri yok.';
                return;
            }

            // Find min/max dates to scale chart
            let minDate = new Date();
            let maxDate = new Date();

            projects.forEach(p => {
                const start = new Date(p.startDate);
                const end = new Date(p.endDate);
                if (start < minDate) minDate = start;
                if (end > maxDate) maxDate = end;
            });

            // Adjust window slightly
            minDate.setDate(minDate.getDate() - 5);
            maxDate.setDate(maxDate.getDate() + 5);

            const totalMs = maxDate - minDate;

            let html = '';
            projects.forEach(p => {
                const s = new Date(p.startDate);
                const e = new Date(p.endDate);

                const leftPos = ((s - minDate) / totalMs) * 100;
                let width = ((e - s) / totalMs) * 100;
                if (width < 2) width = 2; // Min width for visibility

                html += `
                    <div class="gantt-row">
                        <div class="gantt-row-header">
                            <a href="project-detail.html?id=${encodeURIComponent(p.id)}" style="color:var(--color-text);font-size:13px;font-weight:600;">${escapeHtml(p.name)}</a>
                            <div style="font-size:10px;color:var(--color-text-subtle)">${getStatusLabel(p.status)}</div>
                        </div>
                        <div class="gantt-timeline">
                            <div class="gantt-bar" title="${formatDate(p.startDate)} - ${formatDate(p.endDate)}" style="left: ${leftPos}%; width: ${width}%; background-color: ${escapeHtml(p.color)};">
                                ${formatDate(p.startDate)} - ${formatDate(p.endDate)}
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
    </script>
</body>

</html>
